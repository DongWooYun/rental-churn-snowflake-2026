name: Keep Alive

on:
  schedule:
    - cron: '0 0,6,12,18 * * *'  # 6시간마다 (ping)
  workflow_dispatch:

jobs:
  ping-streamlit:
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 0,6,12,18 * * *' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Ping Streamlit (슬립 방지 - 6시간마다)
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
          https://rental-churn-app-2026-dongwooyun.streamlit.app/ || true
          echo "Streamlit ping 완료"
